<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OptiHub</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div id="app">
    <header class="chrome" id="chrome">
      <div class="chrome-left">
        <button type="button" class="icon-btn" id="btnSettings" aria-label="Settings" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
          </svg>
        </button>
        <button type="button" class="icon-btn hidden" id="btnBack" aria-label="Back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <img class="ctx-logo hidden" id="ctxLogo" alt="" width="18" height="18" />
        <span class="ctx-title" id="ctxTitle"></span>
      </div>
      <div class="chrome-right" aria-hidden="true"></div>
    </header>

    <main id="view" class="view" tabindex="-1">
      <div class="boot">
        <div class="boot-mark" aria-hidden="true"></div>
        <div class="boot-title">OptiHub</div>
        <div class="boot-sub">Loading…</div>
      </div>
    </main>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-backdrop" id="modalBackdrop"></div>
      <div class="modal-card">
        <h2 id="modalTitle"></h2>
        <p id="modalBody"></p>
        <div class="modal-actions">
          <button type="button" class="btn ghost" id="modalCancel">Cancel</button>
          <button type="button" class="btn primary" id="modalOk">Continue</button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
