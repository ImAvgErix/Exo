[Settings]
# Gaming-first DiscOpt kernel - aggressive idle trim, high priority, raw input
# Keep intervals moderate so modern Discord hosts stay stable on multi-PC configs
EnableTrim=1
TrimIntervalMs=4000

EnablePriorityFix=1
PriorityClass=3

EnableThreadPriorityFix=1

RawInputMode=1
RawInputSleepMs=800
RawInputPatchDelayMs=1200
