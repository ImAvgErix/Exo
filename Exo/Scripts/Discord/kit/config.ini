[Settings]
# Gaming-first DiscOpt kernel - aggressive idle trim, high priority, raw input
# 2500ms idle trim (valid range 2000-15000; tighter than 4000 for lower resident RAM)
EnableTrim=1
TrimIntervalMs=2500

EnablePriorityFix=1
PriorityClass=3

EnableThreadPriorityFix=1

RawInputMode=1
RawInputSleepMs=800
RawInputPatchDelayMs=1200
