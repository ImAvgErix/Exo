name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Exo.exe and publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./Release-Exo.ps1 -ReplaceExisting -PruneOldReleases
